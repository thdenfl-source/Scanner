<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>DocScan</title>
<script src="https://docs.opencv.org/4.9.0/opencv.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  .view { position: fixed; inset: 0; display: none; flex-direction: column; }
  .view.active { display: flex; }

  /* Top bar */
  .topbar {
    height: 56px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    background: rgba(10,10,10,0.85);
    z-index: 10;
  }
  .topbar .title { font-size: 16px; font-weight: 600; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: none; color: #fff; cursor: pointer;
    font-size: 22px;
  }
  .icon-btn:active { background: #222; }
  .text-btn {
    background: transparent; border: none; color: #4ea1ff;
    font-size: 16px; font-weight: 600; padding: 8px 12px; cursor: pointer;
  }
  .text-btn:disabled { color: #555; }

  /* Camera view */
  #cam-stage {
    flex: 1; position: relative; background: #000; overflow: hidden;
  }
  #video { width: 100%; height: 100%; object-fit: cover; }
  #live-overlay {
    position: absolute; inset: 0; pointer-events: none;
  }
  .cam-bottom {
    height: 130px; flex-shrink: 0;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 16px;
    position: relative;
  }
  .shutter {
    width: 76px; height: 76px; border-radius: 50%;
    background: #fff; border: 5px solid #0a0a0a;
    box-shadow: 0 0 0 3px #fff;
    cursor: pointer;
  }
  .shutter:active { transform: scale(0.95); }
  .thumb-preview {
    width: 56px; height: 56px; border-radius: 8px;
    background: #222; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #aaa;
    cursor: pointer;
  }
  .thumb-preview img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-count {
    position: absolute; top: -6px; right: -6px;
    background: #4ea1ff; color: #fff; font-size: 11px; font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
  }
  .done-btn {
    background: #4ea1ff; color: #fff; border: none;
    padding: 12px 20px; border-radius: 24px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .done-btn:disabled { background: #2a3a52; color: #888; }

  /* Crop view */
  #crop-stage {
    flex: 1; position: relative; background: #111;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #crop-canvas-wrap {
    position: relative;
  }
  #crop-img { display: block; max-width: 100%; max-height: 100%; }
  #crop-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    overflow: visible;
  }
  .crop-handle {
    fill: #4ea1ff; stroke: #fff; stroke-width: 2;
    cursor: grab;
  }
  .crop-line { stroke: #4ea1ff; stroke-width: 2; fill: rgba(78,161,255,0.12); }
  .crop-bottom {
    height: 96px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-around;
    background: #0a0a0a; padding: 0 12px;
  }
  .crop-bottom button {
    background: #1a1a1a; color: #fff; border: 1px solid #333;
    padding: 10px 14px; border-radius: 20px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .crop-bottom button.primary {
    background: #4ea1ff; border-color: #4ea1ff;
  }
  .crop-bottom button:disabled { opacity: 0.4; }

  /* Pages list */
  #pages-grid {
    flex: 1; overflow-y: auto; padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    align-content: start;
  }
  .page-card {
    aspect-ratio: 3/4; background: #1a1a1a; border-radius: 8px;
    overflow: hidden; position: relative; cursor: pointer;
    border: 2px solid transparent;
  }
  .page-card img { width: 100%; height: 100%; object-fit: cover; }
  .page-card .num {
    position: absolute; top: 4px; left: 4px;
    background: rgba(0,0,0,0.7); color: #fff;
    font-size: 11px; padding: 2px 6px; border-radius: 10px;
  }
  .page-card .del {
    position: absolute; top: 4px; right: 4px;
    width: 24px; height: 24px; border-radius: 12px;
    background: rgba(0,0,0,0.7); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; border: none; cursor: pointer;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: #1a1a1a; border-radius: 16px; padding: 20px;
    width: 100%; max-width: 360px;
  }
  .modal h3 { font-size: 18px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: #aaa; margin-bottom: 16px; }
  .modal .opt {
    width: 100%; padding: 14px; margin-bottom: 8px;
    background: #2a2a2a; color: #fff; border: none; border-radius: 10px;
    font-size: 15px; text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
  }
  .modal .opt:active { background: #333; }
  .modal .opt .ico { font-size: 22px; }
  .modal .opt .desc { font-size: 12px; color: #888; }
  .modal .opt .col { display: flex; flex-direction: column; }
  .modal .cancel {
    width: 100%; padding: 12px; margin-top: 8px;
    background: transparent; color: #4ea1ff; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 10px 18px; border-radius: 22px;
    font-size: 14px; z-index: 2000;
    opacity: 0; transition: opacity 0.25s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* Loading */
  #loader {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 3000; color: #fff; font-size: 15px; flex-direction: column; gap: 12px;
  }
  #loader.active { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #333;
    border-top-color: #4ea1ff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #666; font-size: 14px;
  }
</style>
</head>
<body>

<!-- CAMERA VIEW -->
<div id="view-camera" class="view active">
  <div class="topbar">
    <button class="icon-btn" id="btn-close-cam" title="닫기">✕</button>
    <div class="title">DocScan</div>
    <button class="icon-btn" id="btn-flip" title="카메라 전환">⟲</button>
  </div>
  <div id="cam-stage">
    <video id="video" autoplay playsinline muted></video>
    <svg id="live-overlay"></svg>
  </div>
  <div class="cam-bottom">
    <div class="thumb-preview" id="thumb-preview">
      <span id="thumb-empty">0</span>
      <img id="thumb-last" style="display:none"/>
      <div class="thumb-count" id="thumb-count" style="display:none">0</div>
    </div>
    <button class="shutter" id="btn-shutter"></button>
    <button class="done-btn" id="btn-finish" disabled>완료</button>
  </div>
</div>

<!-- CROP VIEW -->
<div id="view-crop" class="view">
  <div class="topbar">
    <button class="icon-btn" id="btn-crop-back">←</button>
    <div class="title">자르기</div>
    <button class="text-btn" id="btn-crop-save">저장</button>
  </div>
  <div id="crop-stage">
    <div id="crop-canvas-wrap">
      <img id="crop-img"/>
      <svg id="crop-svg"></svg>
    </div>
  </div>
  <div class="crop-bottom">
    <button id="btn-auto">⌖ 자동</button>
    <button id="btn-reset">⟲ 전체</button>
    <button id="btn-undo" disabled>↶ 되돌리기</button>
    <button id="btn-rotate">↻ 회전</button>
  </div>
</div>

<!-- PAGES VIEW -->
<div id="view-pages" class="view">
  <div class="topbar">
    <button class="icon-btn" id="btn-pages-back">←</button>
    <div class="title">촬영본 (<span id="page-count">0</span>)</div>
    <button class="text-btn" id="btn-export">내보내기</button>
  </div>
  <div id="pages-grid"></div>
</div>

<!-- Export modal -->
<div class="modal-bg" id="modal-export">
  <div class="modal">
    <h3>저장 형식 선택</h3>
    <p>지금까지 촬영한 페이지를 어떤 형식으로 저장할까요?</p>
    <button class="opt" data-fmt="pdf">
      <span class="ico">📄</span>
      <div class="col"><strong>PDF</strong><span class="desc">모든 페이지를 한 파일로</span></div>
    </button>
    <button class="opt" data-fmt="jpg">
      <span class="ico">🖼️</span>
      <div class="col"><strong>JPG (ZIP)</strong><span class="desc">개별 이미지, 용량 작음</span></div>
    </button>
    <button class="opt" data-fmt="png">
      <span class="ico">🖼️</span>
      <div class="col"><strong>PNG (ZIP)</strong><span class="desc">개별 이미지, 무손실</span></div>
    </button>
    <button class="cancel" id="btn-export-cancel">취소</button>
  </div>
</div>

<!-- Quit confirm modal -->
<div class="modal-bg" id="modal-quit">
  <div class="modal">
    <h3>작업을 종료할까요?</h3>
    <p>저장하지 않으면 촬영한 페이지가 사라집니다.</p>
    <button class="opt" id="quit-save">
      <span class="ico">💾</span>
      <div class="col"><strong>저장하고 종료</strong><span class="desc">형식 선택 후 저장</span></div>
    </button>
    <button class="opt" id="quit-discard">
      <span class="ico">🗑️</span>
      <div class="col"><strong>저장하지 않고 종료</strong><span class="desc">모든 페이지 삭제</span></div>
    </button>
    <button class="cancel" id="quit-cancel">계속 촬영</button>
  </div>
</div>

<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div id="loader-msg">처리 중…</div></div>

<script>
/* ============================================================
   DocScan — vFlat-like document scanner (PWA single-file)
   ============================================================ */

const $ = (id) => document.getElementById(id);
const views = { camera: $('view-camera'), crop: $('view-crop'), pages: $('view-pages') };
function show(name) {
  for (const k in views) views[k].classList.toggle('active', k === name);
}
function toast(msg, ms=1600) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function loader(on, msg='처리 중…') {
  $('loader-msg').textContent = msg;
  $('loader').classList.toggle('active', !!on);
}

/* ---------- State ---------- */
const state = {
  pages: [],         // { id, dataUrl (cropped), srcDataUrl, srcW, srcH, corners, rotation, history:[{corners,rotation}] }
  pending: null,     // page currently being cropped (before commit)
  facing: 'environment',
  stream: null,
  cvReady: false,
};

window.Module = {
  onRuntimeInitialized() { state.cvReady = true; }
};

/* ---------- Camera ---------- */
async function startCamera() {
  stopCamera();
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facing, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    $('video').srcObject = state.stream;
  } catch (e) {
    toast('카메라 접근 실패: ' + e.message, 3000);
  }
}
function stopCamera() {
  if (state.stream) { state.stream.getTracks().forEach(t=>t.stop()); state.stream = null; }
}

$('btn-flip').onclick = () => {
  state.facing = state.facing === 'environment' ? 'user' : 'environment';
  startCamera();
};

$('btn-shutter').onclick = captureFrame;

function captureFrame() {
  const v = $('video');
  if (!v.videoWidth) { toast('카메라 준비 중'); return; }
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  const dataUrl = c.toDataURL('image/jpeg', 0.92);
  openCrop({
    id: 'p' + Date.now() + Math.random().toString(36).slice(2,6),
    srcDataUrl: dataUrl,
    srcW: c.width, srcH: c.height,
    corners: null, rotation: 0, history: [],
    dataUrl: null,
  }, /*isNew=*/true);
}

/* ---------- Crop view ---------- */
let cropImg = $('crop-img');
let cropSvg = $('crop-svg');
let displayScale = 1;       // image px -> displayed px
let dragHandle = null;

function openCrop(page, isNew) {
  state.pending = { page, isNew };
  cropImg.onload = () => {
    const rect = cropImg.getBoundingClientRect();
    displayScale = rect.width / page.srcW;
    cropSvg.setAttribute('width', rect.width);
    cropSvg.setAttribute('height', rect.height);
    cropSvg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
    if (!page.corners) {
      // Try auto-detect
      autoDetect().then(corners => {
        page.corners = corners || defaultCorners(page.srcW, page.srcH);
        drawCorners();
      });
    } else {
      drawCorners();
    }
    updateUndoBtn();
  };
  cropImg.src = page.srcDataUrl;
  show('crop');
}

function defaultCorners(w, h) {
  const m = 0.05;
  return [
    [w*m, h*m], [w*(1-m), h*m], [w*(1-m), h*(1-m)], [w*m, h*(1-m)]
  ];
}

function drawCorners() {
  const p = state.pending.page;
  const pts = p.corners.map(([x,y]) => [x*displayScale, y*displayScale]);
  const poly = pts.map(p=>p.join(',')).join(' ');
  cropSvg.innerHTML = `
    <polygon class="crop-line" points="${poly}"/>
    ${pts.map((pt,i)=>`<circle class="crop-handle" data-i="${i}" cx="${pt[0]}" cy="${pt[1]}" r="14"></circle>`).join('')}
  `;
  cropSvg.querySelectorAll('.crop-handle').forEach(h => {
    h.addEventListener('pointerdown', onHandleDown);
  });
}

function onHandleDown(e) {
  e.preventDefault();
  dragHandle = parseInt(e.target.dataset.i, 10);
  e.target.setPointerCapture(e.pointerId);
  e.target.addEventListener('pointermove', onHandleMove);
  e.target.addEventListener('pointerup', onHandleUp, { once: true });
  // Push history snapshot before moving
  pushHistory();
}
function onHandleMove(e) {
  if (dragHandle == null) return;
  const rect = cropImg.getBoundingClientRect();
  const x = (e.clientX - rect.left) / displayScale;
  const y = (e.clientY - rect.top) / displayScale;
  const p = state.pending.page;
  p.corners[dragHandle] = [
    Math.max(0, Math.min(p.srcW, x)),
    Math.max(0, Math.min(p.srcH, y))
  ];
  drawCorners();
}
function onHandleUp(e) {
  dragHandle = null;
}

function pushHistory() {
  const p = state.pending.page;
  p.history.push({ corners: JSON.parse(JSON.stringify(p.corners)), rotation: p.rotation });
  if (p.history.length > 30) p.history.shift();
  updateUndoBtn();
}
function updateUndoBtn() {
  $('btn-undo').disabled = !state.pending || state.pending.page.history.length === 0;
}

$('btn-undo').onclick = () => {
  const p = state.pending.page;
  const last = p.history.pop();
  if (last) {
    p.corners = last.corners; p.rotation = last.rotation;
    drawCorners();
  }
  updateUndoBtn();
};
$('btn-reset').onclick = () => {
  pushHistory();
  const p = state.pending.page;
  p.corners = [[0,0],[p.srcW,0],[p.srcW,p.srcH],[0,p.srcH]];
  drawCorners();
};
$('btn-auto').onclick = async () => {
  pushHistory();
  const c = await autoDetect();
  state.pending.page.corners = c || defaultCorners(state.pending.page.srcW, state.pending.page.srcH);
  drawCorners();
};
$('btn-rotate').onclick = () => {
  pushHistory();
  const p = state.pending.page;
  p.rotation = (p.rotation + 90) % 360;
  // Rotate corners around image center
  const cx = p.srcW/2, cy = p.srcH/2;
  // For 90deg CW: new image dims swap; rotate corners
  // But we keep srcW/H and just rotate at export — simpler: actually rotate the source
  rotateSource90();
};

function rotateSource90() {
  const p = state.pending.page;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.height; c.height = img.width;
    const ctx = c.getContext('2d');
    ctx.translate(c.width, 0);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(img, 0, 0);
    p.srcDataUrl = c.toDataURL('image/jpeg', 0.92);
    [p.srcW, p.srcH] = [c.width, c.height];
    // Rotate corners
    p.corners = p.corners.map(([x,y]) => [p.srcW - y, x]);
    cropImg.onload = () => {
      const rect = cropImg.getBoundingClientRect();
      displayScale = rect.width / p.srcW;
      cropSvg.setAttribute('width', rect.width);
      cropSvg.setAttribute('height', rect.height);
      drawCorners();
    };
    cropImg.src = p.srcDataUrl;
  };
  img.src = p.srcDataUrl;
}

$('btn-crop-back').onclick = () => {
  if (state.pending.isNew) {
    // Discard
    state.pending = null;
    show('camera');
  } else {
    state.pending = null;
    show('pages');
  }
};

$('btn-crop-save').onclick = async () => {
  loader(true, '자르는 중…');
  const p = state.pending.page;
  try {
    const out = await warpCrop(p);
    p.dataUrl = out;
    if (state.pending.isNew) {
      state.pages.push(p);
    } else {
      const idx = state.pages.findIndex(x => x.id === p.id);
      if (idx >= 0) state.pages[idx] = p;
    }
    state.pending = null;
    refreshPagesUI();
    refreshThumb();
    loader(false);
    show('camera');
    toast('페이지 저장됨');
  } catch (e) {
    loader(false);
    toast('자르기 실패: ' + e.message, 2500);
  }
};

/* ---------- Auto detect (OpenCV) ---------- */
async function autoDetect() {
  if (!state.cvReady || typeof cv === 'undefined') return null;
  try {
    const p = state.pending.page;
    const img = new Image();
    await new Promise(r => { img.onload = r; img.src = p.srcDataUrl; });
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    const src = cv.imread(c);
    const gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(5,5), 0);
    const edges = new cv.Mat();
    cv.Canny(gray, edges, 50, 150);
    const kernel = cv.Mat.ones(5,5,cv.CV_8U);
    cv.dilate(edges, edges, kernel);
    const contours = new cv.MatVector();
    const hier = new cv.Mat();
    cv.findContours(edges, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
    let best = null, bestArea = 0;
    const totalArea = img.width * img.height;
    for (let i = 0; i < contours.size(); i++) {
      const cnt = contours.get(i);
      const peri = cv.arcLength(cnt, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
      if (approx.rows === 4) {
        const area = Math.abs(cv.contourArea(approx));
        if (area > bestArea && area > totalArea * 0.1) {
          bestArea = area;
          best = [];
          for (let j = 0; j < 4; j++) {
            best.push([approx.data32S[j*2], approx.data32S[j*2+1]]);
          }
        }
      }
      approx.delete(); cnt.delete();
    }
    src.delete(); gray.delete(); edges.delete(); kernel.delete();
    contours.delete(); hier.delete();
    if (!best) return null;
    // Order: TL, TR, BR, BL
    return orderCorners(best);
  } catch (e) {
    console.warn('auto detect error', e);
    return null;
  }
}

function orderCorners(pts) {
  // Sort by y, then split top/bottom, sort by x
  const sorted = [...pts].sort((a,b)=>a[1]-b[1]);
  const top = sorted.slice(0,2).sort((a,b)=>a[0]-b[0]);
  const bot = sorted.slice(2,4).sort((a,b)=>a[0]-b[0]);
  return [top[0], top[1], bot[1], bot[0]];
}

/* ---------- Perspective warp & crop ---------- */
async function warpCrop(page) {
  const img = new Image();
  await new Promise(r => { img.onload = r; img.src = page.srcDataUrl; });

  const [tl, tr, br, bl] = page.corners;
  const wA = Math.hypot(br[0]-bl[0], br[1]-bl[1]);
  const wB = Math.hypot(tr[0]-tl[0], tr[1]-tl[1]);
  const hA = Math.hypot(tr[0]-br[0], tr[1]-br[1]);
  const hB = Math.hypot(tl[0]-bl[0], tl[1]-bl[1]);
  const outW = Math.max(1, Math.round(Math.max(wA,wB)));
  const outH = Math.max(1, Math.round(Math.max(hA,hB)));

  // Use OpenCV if ready, otherwise fall back to axis-aligned bbox crop
  if (state.cvReady && typeof cv !== 'undefined') {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    const src = cv.imread(c);
    const srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      tl[0],tl[1], tr[0],tr[1], br[0],br[1], bl[0],bl[1]
    ]);
    const dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [
      0,0, outW,0, outW,outH, 0,outH
    ]);
    const M = cv.getPerspectiveTransform(srcTri, dstTri);
    const dst = new cv.Mat();
    cv.warpPerspective(src, dst, M, new cv.Size(outW, outH));
    const out = document.createElement('canvas');
    out.width = outW; out.height = outH;
    cv.imshow(out, dst);
    src.delete(); dst.delete(); srcTri.delete(); dstTri.delete(); M.delete();
    return out.toDataURL('image/jpeg', 0.92);
  } else {
    // Fallback: bounding box
    const xs = page.corners.map(p=>p[0]), ys = page.corners.map(p=>p[1]);
    const x0=Math.min(...xs), y0=Math.min(...ys);
    const x1=Math.max(...xs), y1=Math.max(...ys);
    const w = Math.max(1, x1-x0), h = Math.max(1, y1-y0);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, x0, y0, w, h, 0, 0, w, h);
    return c.toDataURL('image/jpeg', 0.92);
  }
}

/* ---------- Pages UI ---------- */
function refreshThumb() {
  const n = state.pages.length;
  $('btn-finish').disabled = n === 0;
  if (n === 0) {
    $('thumb-empty').style.display = '';
    $('thumb-last').style.display = 'none';
    $('thumb-count').style.display = 'none';
    $('thumb-empty').textContent = '0';
  } else {
    $('thumb-empty').style.display = 'none';
    $('thumb-last').style.display = '';
    $('thumb-last').src = state.pages[state.pages.length-1].dataUrl;
    $('thumb-count').style.display = '';
    $('thumb-count').textContent = n;
  }
}
function refreshPagesUI() {
  $('page-count').textContent = state.pages.length;
  const grid = $('pages-grid');
  if (state.pages.length === 0) {
    grid.innerHTML = '<div class="empty">촬영된 페이지가 없습니다.</div>';
    return;
  }
  grid.innerHTML = '';
  state.pages.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'page-card';
    card.innerHTML = `
      <img src="${p.dataUrl}"/>
      <div class="num">${i+1}</div>
      <button class="del" data-id="${p.id}">✕</button>
    `;
    card.querySelector('img').onclick = () => openCrop(p, false);
    card.querySelector('.del').onclick = (e) => {
      e.stopPropagation();
      state.pages = state.pages.filter(x => x.id !== p.id);
      refreshPagesUI(); refreshThumb();
    };
    grid.appendChild(card);
  });
}

$('thumb-preview').onclick = () => {
  if (state.pages.length === 0) return;
  refreshPagesUI();
  show('pages');
};
$('btn-pages-back').onclick = () => show('camera');
$('btn-finish').onclick = () => {
  if (state.pages.length === 0) return;
  refreshPagesUI();
  show('pages');
};

/* ---------- Export ---------- */
$('btn-export').onclick = () => {
  if (state.pages.length === 0) { toast('저장할 페이지가 없습니다'); return; }
  $('modal-export').classList.add('active');
};
$('btn-export-cancel').onclick = () => $('modal-export').classList.remove('active');
document.querySelectorAll('#modal-export .opt').forEach(b => {
  b.onclick = () => {
    const fmt = b.dataset.fmt;
    $('modal-export').classList.remove('active');
    exportAs(fmt);
  };
});

async function exportAs(fmt) {
  loader(true, '저장 파일 생성 중…');
  try {
    const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    if (fmt === 'pdf') {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'pt', format: 'a4' });
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      for (let i = 0; i < state.pages.length; i++) {
        const p = state.pages[i];
        const img = new Image();
        await new Promise(r => { img.onload = r; img.src = p.dataUrl; });
        const ratio = Math.min(pageW/img.width, pageH/img.height);
        const w = img.width*ratio, h = img.height*ratio;
        const x = (pageW-w)/2, y = (pageH-h)/2;
        if (i > 0) pdf.addPage();
        pdf.addImage(p.dataUrl, 'JPEG', x, y, w, h);
      }
      pdf.save(`docscan-${stamp}.pdf`);
    } else {
      const zip = new JSZip();
      const mime = fmt === 'png' ? 'image/png' : 'image/jpeg';
      const ext = fmt;
      for (let i = 0; i < state.pages.length; i++) {
        const p = state.pages[i];
        let dataUrl = p.dataUrl;
        if (fmt === 'png') {
          // Re-encode as PNG
          const img = new Image();
          await new Promise(r => { img.onload = r; img.src = p.dataUrl; });
          const c = document.createElement('canvas');
          c.width = img.width; c.height = img.height;
          c.getContext('2d').drawImage(img, 0, 0);
          dataUrl = c.toDataURL('image/png');
        }
        const b64 = dataUrl.split(',')[1];
        zip.file(`page-${String(i+1).padStart(3,'0')}.${ext}`, b64, { base64: true });
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `docscan-${stamp}-${fmt}.zip`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
    }
    loader(false);
    toast('저장 완료');
    // Clear after save
    state.pages = [];
    refreshPagesUI(); refreshThumb();
    show('camera');
  } catch (e) {
    loader(false);
    toast('저장 실패: ' + e.message, 3000);
  }
}

/* ---------- Quit ---------- */
$('btn-close-cam').onclick = () => {
  if (state.pages.length === 0) {
    toast('촬영된 페이지가 없습니다');
    return;
  }
  $('modal-quit').classList.add('active');
};
$('quit-cancel').onclick = () => $('modal-quit').classList.remove('active');
$('quit-save').onclick = () => {
  $('modal-quit').classList.remove('active');
  refreshPagesUI();
  show('pages');
  $('modal-export').classList.add('active');
};
$('quit-discard').onclick = () => {
  state.pages = [];
  refreshPagesUI(); refreshThumb();
  $('modal-quit').classList.remove('active');
  toast('모든 페이지를 삭제했습니다');
};

/* ---------- Init ---------- */
refreshThumb();
refreshPagesUI();
startCamera();

window.addEventListener('beforeunload', stopCamera);
</script>
